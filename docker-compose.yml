version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transitops
      POSTGRES_PASSWORD: transitops123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:transitops123@db:5432/transitops
      JWT_SECRET: transitops-hackathon-secret-2026
      CLIENT_URL: http://localhost:5173
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node src/server.js"

volumes:
  pgdata:
